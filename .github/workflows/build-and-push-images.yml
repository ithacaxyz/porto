name: Build And Push Porto Manager and Dialog Images
on:
  workflow_dispatch:
  push:
    tags:
      - porto*
jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - dockerfile: docker/manager/Dockerfile
            ghcr_repo: ghcr.io/ithacaxyz/porto-manager
          - dockerfile: docker/dialog/Dockerfile
            ghcr_repo: ghcr.io/ithacaxyz/porto-dialog
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ matrix.ghcr_repo }}:${{ github.ref_name }}
            ${{ matrix.ghcr_repo }}:latest