name: Verify
on:
  workflow_call:

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Check code
        run: bun check

      - name: Check types
        run: bun check:types

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Build
        run: bun build

      - name: Check build
        run: bun check:build

      - name: Check for unused files, dependencies, and exports
        run: bun check:knip

      - name: Check size
        run: bun check:size

  test:
    name: Test
    uses: ./.github/workflows/test.yml
    secrets: inherit